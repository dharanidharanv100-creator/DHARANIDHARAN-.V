<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #2575fc;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #6a11cb;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f1f1f1;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            transition: 0.3s;
        }

        li:hover {
            background: #dcdcdc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Dynamic Task List</h2>

        <input type="text" id="task" placeholder="Enter task">
        <button onclick="addTask()">Add</button>

        <h3>Task List:</h3>
        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            let taskText = document.getElementById("task").value;

            if (taskText == "") {
                alert("Please enter a task!");
                return;
            }

            let li = document.createElement("li");
            li.innerText = taskText;

            document.getElementById("taskList").appendChild(li);

            document.getElementById("task").value = "";
        }
    </script>

</body>
</html>
